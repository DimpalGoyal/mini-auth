<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input id="email" type="email" placeholder="enter your email" /><br /><br />
    <input
      id="password"
      type="password"
      placeholder="enter your password"
    /><br /><br />
    <button id="btn" onclick="login()">sign up</button><br /><br />
    <div id="container"></div>
    <br /><br />
    <input id="tokenBox" placeholder="token" type="text" />
    <button id="tokenBtn" onclick="tokenGen()">check token</button>
    <div id="tokenContainer"></div>
  </body>
  <script>
    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const container = document.getElementById("container");

      const res = await fetch("/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });

      const token = await res.text();
      console.log(token)
    }

    async function tokenGen() {
      const userToken = document.getElementById("tokenBox").value;
      const tokenContainer = document.getElementById("tokenContainer");

      const res = await fetch("/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userToken }),
      });

      const tokenText = await res.text();

      tokenContainer.innerText = tokenText;
    }
  </script>
</html>
